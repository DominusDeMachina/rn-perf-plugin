# Avoid Barrel Exports

## When to use
The user has barrel `index.ts` files in `components/`, `screens/`, `utils/`, etc., sees Metro `Require cycle: ...` warnings, suffers HMR full-reloads, or notices the bundle is much bigger than expected after importing a single component.

## What this skill does (single responsibility)
Eliminates barrel `index.ts` re-export files from app code and switches consumers to direct file imports. This skill is about app-code barrels under Metro specifically — barrels are bad in RN *because* Metro doesn't tree-shake. For the broader fix (enable tree shaking), see [[rn-perf-tree-shaking]]; for measuring the win, see [[rn-perf-analyze-js-bundle]].

## Workflow
1. Search the codebase for `index.ts` / `index.js` files inside `components/`, `screens/`, `utils/`, `hooks/` directories. These are likely barrels.
2. For each barrel:
   - If it has fewer than ~3 consumers, **delete** it and update consumers to direct paths.
   - If many consumers, **rewrite** each consumer one PR at a time (search-replace driven), then delete the barrel.
3. Verify with [[rn-perf-analyze-js-bundle]] that previously-included unused modules vanish from the treemap.
4. Install `eslint-plugin-no-barrel-imports` to prevent regression.
5. For third-party libraries that ship barrels with submodule support (date-fns is the canonical example), use the submodule form.

## Code patterns

The barrel anti-pattern:

```ts
// components/index.ts -- an index file (avoid)
export { Button } from './Button';
export { Card } from './Card';
export { Modal } from './Modal';

// elsewhere:
import { Button, Card, Modal, Sidebar } from './components'; // pulls EVERYTHING
```

The direct-import fix:

```ts
// importing from individual files (better)
import Button from './components/Button';
import Card from './components/Card';
import Modal from './components/Modal';
```

The `date-fns` submodule pattern — the canonical third-party example:

```ts
// avoid: pulls the entire date-fns library
import { format, addDays, isToday } from 'date-fns';

// prefer: each import only pulls one function
import format from 'date-fns/format';
import addDays from 'date-fns/addDays';
import isToday from 'date-fns/isToday';
```

Install and enable `eslint-plugin-no-barrel-imports`:

```
yarn add -D eslint-plugin-no-barrel-imports
```

`.eslintrc.js` (or flat config):

```js
{
  plugins: ['no-barrel-imports'],
  rules: {
    'no-barrel-imports/no-barrel-imports': 'error',
  },
}
```

## Verification
- After replacing a barrel, re-run [[rn-perf-analyze-js-bundle]] — modules that were only re-exported by the barrel should no longer appear in the treemap.
- Metro's `Require cycle: ...` warning disappears from `npx react-native start` output.
- HMR: edit a file inside what was a cycle, save, and the change hot-reloads instead of forcing a full bundle reload.
- TTI drops modestly (re-measure with `rn-perf-measure-tti`) on apps with many barrels on the init path.

## Edge cases & gotchas
- **React Native Paper and similar libraries** ship a dedicated Babel plugin that strips unused exports from their barrel — install the plugin instead of rewriting their imports.
- **Some Metro versions** auto-add an entry-point barrel for `react-native` itself. That's profiled and fast-path optimised — don't rewrite `react-native` imports.
- **date-fns was specifically designed** to support submodule imports. Not every library is — verify the package's `exports` field in its `package.json` or its docs before assuming submodule paths work.
- **Type-only barrels** (`export type { Foo } from './Foo'`) have no runtime cost — Babel strips them. Keep them if they aid DX.
- **VS Code "Auto Imports"** will happily insert barrel imports when the file exists. Removing the barrel file forces auto-imports to direct paths.
- The three problems with barrels: (1) Metro pulls every re-exported file into the bundle; (2) all those modules **evaluate** before the requested one returns, hitting TTI; (3) cycles become trivial to introduce and break HMR.
- If you can't remove a barrel today, upgrade to a setup with real tree shaking — Re.Pack eliminates unused re-exports automatically. See [[rn-perf-tree-shaking]].

## References
- Book: "The Ultimate Guide to React Native Optimization" (2025), chapter "Avoid Barrel Exports", pp. 156–158.
- eslint-plugin-no-barrel-imports: https://www.npmjs.com/package/eslint-plugin-no-barrel-imports
- date-fns submodule docs: https://date-fns.org

