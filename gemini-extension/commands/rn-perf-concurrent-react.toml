# RN Perf Skill: rn-perf-concurrent-react

Use when: Use whenever the user reports typing lag, slider jank, search-filter jank, or screen-swap freezes in React Native, or mentions `useDeferredValue`, `useTransition`, `startTransition`, `Suspense`, automatic batching, `isPending`, New Architecture concurrent rendering, or "the input freezes when the list updates" — even if they don't explicitly ask for Concurrent React. Applies React 18+ primitives to keep critical input responsive while heavy downstream work catches up at low priority.

Follow the skill instructions below. If another RN Perf skill is referenced as `[[skill-name]]`, use that skill's command when it is available, or apply the referenced skill from the package source if you have it loaded.

Gemini CLI appends the user's raw command after this prompt when arguments are provided.

# Concurrent React Primitives for Responsive Input

## When to use
A user-driven control (TextInput, slider, toggle) lags because a downstream consumer (filtered list, heavy chart, search results) is doing too much work per keystroke. You want to keep the critical input synchronous and defer the expensive update to a lower priority.

## What this skill does (single responsibility)
Applies Concurrent React primitives — `useDeferredValue`, `useTransition`, automatic batching, and `Suspense` for data — to scope priority so the UI stays responsive under heavy state updates. Out of scope: atomic state refactors ([[rn-perf-atomic-state-management]]), automatic memoization ([[rn-perf-react-compiler]]), and UI-thread animations ([[rn-perf-animations-reanimated]]). Concurrent React only addresses *JS-side* deferral.

## Workflow
1. **Confirm the New Architecture is enabled.** RN 0.76+ has it on by default; on older projects verify `newArchEnabled=true` in `gradle.properties` and equivalent in the Podfile. Without it, `useTransition` and `Suspense`-for-data are not fully wired.
2. **Profile the freezing input.** Use React Native DevTools (see [[rn-perf-profile-js-react]]) to find a fast-firing handler (typing, slider) whose downstream commit blows past 16 ms.
3. **Pick the primitive by the shape of the problem.**
   - **One value drives one heavy child** → `useDeferredValue(value)` on the child's prop. Wrap the child in `React.memo`.
   - **One handler triggers many state updates or a screen swap** → `useTransition`; show a spinner when `isPending`.
   - **Data fetch in a child** → `<Suspense fallback={…}>`, pair with `useDeferredValue` for a staleness signal.
4. **Show staleness.** Apply opacity or a spinner while `value !== deferredValue` (or `isPending` is true). The user needs to see that the screen is catching up rather than broken.
5. **Confirm automatic batching.** Inside async callbacks (`setTimeout`, `fetch().then`), multiple `setState` calls now produce one commit — Profile to verify.
6. **Re-record** to confirm the critical input no longer drops frames and the deferred child catches up shortly after.

## Code patterns

Defer a heavy child while keeping the counter responsive (book p. 47). The book's tip: "Remember to wrap computation-heavy components you're passing deferred values to in `React.memo()` to prevent unnecessary re-renders caused by parent component re-renders" (p. 48).

```tsx
import { useDeferredValue, useState } from 'react';

function DeferredScreen() {
  const [count, setCount] = useState(0);
  const deferredCount = useDeferredValue(count);

  return (
    <>
      <CounterNumber count={count} />
      <SlowComponent count={deferredCount} />
      {count !== deferredCount ? <ActivityIndicator /> : null}
      <Button onPress={() => setCount(count + 1)} title="Increment" />
    </>
  );
}
```

Search with stale-while-loading via `Suspense` + `useDeferredValue` (book pp. 48–49):

```tsx
function SearchScreen() {
  const [query, setQuery] = useState('');
  const deferredQuery = useDeferredValue(query);
  const isStale = query !== deferredQuery;

  return (
    <View>
      <TextInput value={query} onChangeText={setQuery} placeholder="Search items..." />
      <Suspense fallback={<LoadingSpinner />}>
        <View style={[isStale && { opacity: 0.8 }]}>
          <SearchResults query={deferredQuery} />
        </View>
      </Suspense>
    </View>
  );
}
```

`useTransition` for a heavy secondary update — critical `setCount` stays sync, expensive `setSlowCount` runs at low priority (book pp. 49–50):

```tsx
function TransitionScreen() {
  const [count, setCount] = useState(0);
  const [slowCount, setSlowCount] = useState(0);
  const [isPending, startTransition] = useTransition();

  const handleIncrement = () => {
    setCount(prev => prev + 1);
    startTransition(() => {
      setSlowCount(prev => prev + 1);
    });
  };

  return (
    <SafeAreaView>
      <CounterNumber count={count} />
      <SlowComponent count={slowCount} />
      {isPending ? <LoadingSpinner /> : null}
      <Button onPress={handleIncrement} title="Increment" />
    </SafeAreaView>
  );
}
```

Automatic batching — React 18 collapses both setStates into one commit even inside `setTimeout` (book p. 51):

```ts
setTimeout(() => {
  setProductQuantity(q => q + 1);
  setIsCartOpen(o => !o);
  // React 18: one render, not two
}, 1000);
```

## Verification
- **JS FPS during input** stays ≥ 58 fps on a low-end Android while results render (Perf Monitor).
- **Profiler:** the critical-priority commit (TextInput update) lands at < 16 ms; the deferred commit follows when the JS thread has slack.
- **Staleness cue** (opacity / spinner) appears whenever `query !== deferredQuery` or `isPending`, confirming the deferral is real.
- **Batching:** an async callback firing N `setState`s shows one commit in DevTools Profiler, not N.

## Edge cases & gotchas
- **`useDeferredValue` reorders work, it doesn't shrink it.** A 200 ms heavy render still takes 200 ms — the win is keeping the input responsive during that span.
- **Always `React.memo` the heavy deferred consumer** (book p. 48). Otherwise a parent re-render forces it to re-render anyway, defeating the purpose.
- **`useTransition` is for JS-driven transitions.** Native-stack navigators (React Navigation) swap screens on the UI thread; wrapping `navigation.navigate` in `startTransition` accomplishes nothing. The book is explicit: JS-based navigators benefit, native ones don't (p. 50).
- **Don't wrap critical updates in `startTransition`.** The input value must stay synchronous; only defer downstream effects.
- **Pre-New-Architecture caveat:** without the New Arch, `useTransition`/`useDeferredValue` exist but Suspense-for-data and full async rendering don't. Confirm before relying.
- **Automatic batching can surprise code that relied on intermediate commits.** Use `flushSync` for the rare exception.

## References
- Book: "The Ultimate Guide to React Native Optimization" (2025), chapter "Concurrent React", pp. 46–51
- React 18 explainer (automatic batching deep-dive) — https://react.dev/blog/2022/03/29/react-v18

