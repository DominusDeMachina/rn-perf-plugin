# RN Perf Skill: rn-perf-library-size

Use when: Use when the user is about to add an npm dependency to a React Native app and wants to estimate its bundle cost first — runs through bundlephobia.com, pkg-size.dev, and the Import Cost VS Code/Cursor extension. Trigger whenever the user mentions bundlephobia, pkg-size, Import Cost, "how big is this package", "should I use moment or date-fns", "is uuid heavier than nanoid", evaluating an npm dep, comparing two libraries, or asks "what does this library cost?" — even without an explicit ask to measure.

