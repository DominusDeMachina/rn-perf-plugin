- [[rn-perf-tree-shaking]] — what enables you to pay only for what you import.
- [[rn-perf-avoid-barrel-exports]] — most common reason actual cost dwarfs the bundlephobia estimate.
- [[rn-perf-analyze-app-bundle]] — the missing dimension here: native-code cost.
