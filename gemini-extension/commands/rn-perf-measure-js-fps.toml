Use when: Use when the user wants to measure JS-thread FPS in a React Native app — interactively via Perf Monitor or in CI via Flashlight + Maestro. Trigger whenever the user mentions jank, stutter, dropped frames, "low FPS", "JS FPS", "UI FPS", Perf Monitor, Flashlight, Maestro, 60 fps, 120 fps, or wants automated FPS regression detection — even if they don't explicitly ask to measure frames.

