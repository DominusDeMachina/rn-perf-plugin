# RN Perf Skill: rn-perf-perfetto-traces

Use when: Use when the user is capturing, opening, or sharing a Perfetto / system trace for a React Native app — uploading a `.perfetto-trace` to `ui.perfetto.dev`, recording via `adb shell perfetto`, navigating per-CPU lanes, pinning `mqt_v_js` / `mqt_v_native` / `main`, drag-selecting an "Android Missed Frames" region, or running SQL queries against the trace processor. Trigger whenever the user mentions Perfetto, `ui.perfetto.dev`, `.perfetto-trace`, system trace, "share a trace", `traceconv`, "trace SQL", Android Missed Frames, `surfaceflinger`, or wants to correlate frame drops with thread activity at the OS level.

