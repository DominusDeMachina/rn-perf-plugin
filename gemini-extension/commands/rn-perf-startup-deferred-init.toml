# RN Perf Skill: rn-perf-startup-deferred-init

Use when: Use when a React Native app has slow startup, high TTI, a long splash screen, or a heavy bootstrap path around index.js / App.tsx top-level imports, eager SDK init (Sentry, Firebase, analytics, feature flags, ads), Metro `inlineRequires`, `React.lazy`, `InteractionManager.runAfterInteractions`, `react-native-bootsplash`, or `expo-splash-screen`. Audits the startup path and defers non-critical initialization and module evaluation until after the first interactive frame.

