- [[rn-perf-analyze-js-bundle]] — measure the delta.
- [[rn-perf-remote-code-loading]] — next step once tree shaking is exhausted.
- [[rn-perf-library-size]] — pre-flight check; tree shaking lowers the *effective* cost.
