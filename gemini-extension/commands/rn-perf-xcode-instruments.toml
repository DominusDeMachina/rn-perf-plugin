# RN Perf Skill: rn-perf-xcode-instruments

Use when: Use when the user is opening, navigating, or interpreting Xcode Instruments for a React Native iOS app — launching from a running app via `Product → Profile` (Cmd+I) or `Xcode → Open Developer Tool → Instruments`, picking the Time Profiler / Leaks / Allocations template, reading the call tree vs flame graph, pinning the JS thread, toggling Call Tree filters, opening Debug View Hierarchy, or saving and sharing a `.trace` file. Trigger whenever the user mentions Xcode Instruments, Time Profiler, Leaks template, Allocations, Microhang, Hang, `RCTViewComponentView`, Debug View Hierarchy, `xctrace`, or asks "how do I attach Instruments to my RN app".

