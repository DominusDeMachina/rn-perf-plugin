- Book: "The Ultimate Guide to React Native Optimization" (2026), "How to Profile Native Parts of React Native", pp. 92–101.
- Book: same title, "How to Hunt Memory Leaks", pp. 159–163.
- Book: same title, "Use View Flattening", pp. 136–138.
